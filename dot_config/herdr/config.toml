onboarding = false

[theme]
name = "dracula"

[terminal]
shell_mode = "auto"
new_cwd = "current"

[keys]
prefix = "ctrl+t"

[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

[[keys.command]]
key = "alt+h"
type = "shell"
command = "herdr pane resize --direction left --amount 0.01"

[[keys.command]]
key = "alt+j"
type = "shell"
command = "herdr pane resize --direction down --amount 0.025"

[[keys.command]]
key = "alt+k"
type = "shell"
command = "herdr pane resize --direction up --amount 0.025"

[[keys.command]]
key = "alt+l"
type = "shell"
command = "herdr pane resize --direction right --amount 0.01"

[[keys.command]]
key = "prefix+|"
type = "shell"
command = "herdr pane split --direction right --focus"

[[keys.command]]
key = "prefix+%"
type = "shell"
command = "herdr pane split --direction right --focus"

# not working
